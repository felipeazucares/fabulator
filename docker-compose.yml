# =============================================================================
# Fabulator — Docker Compose
# =============================================================================
# Two containers, two Dockerfiles:
#   fabulator-api  → server/Dockerfile      (FastAPI, Atlas + Redis Cloud)
#   claude-code    → .devcontainer/Dockerfile (Claude Code, dev profile only)
#
# Usage:
#   API only:             docker compose up
#   With Claude Code:     docker compose --profile dev up
#   One-shot Claude Code: docker compose --profile dev run --rm claude-code
# =============================================================================
services:

  fabulator-api:
    build:
      context: .                        # root — so COPY requirements.txt works
      dockerfile: server/Dockerfile
    container_name: fabulator-api
    platform: linux/arm64
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app:cached            # live reload without rebuild
    env_file:
      - .env
    restart: unless-stopped

  claude-code:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    image: fabulator-claude-code
    container_name: fabulator-claude
    platform: linux/arm64
    profiles:
      - dev
    volumes:
      - .:/workspace:cached
      - ${HOME}/.claude:/home/claude/.claude   # auth persistence across rebuilds
      - ${HOME}/.gitconfig:/home/claude/.gitconfig:ro
      - ${HOME}/.ssh:/home/claude/.ssh:ro
    env_file:
      - .env
    environment:
      - FABULATOR_API_URL=http://fabulator-api:8000
    depends_on:
      fabulator-api:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: "no"

networks:
  default:
    name: fabulator-network
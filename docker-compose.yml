# =============================================================================
# Fabulator — Docker Compose
# =============================================================================
# Two containers, two Dockerfiles:
#   fabulator-api  → server/Dockerfile       (FastAPI, Atlas + Redis Cloud)
#   claude-code    → .devcontainer/Dockerfile (Claude Code)
#
# Auth:
#   fabulator-api  uses ANTHROPIC_API_KEY from .env
#   claude-code    uses CLAUDE_CODE_OAUTH_TOKEN from .env
#                  DO NOT pass ANTHROPIC_API_KEY to claude-code — auth conflict.
#
# Usage:
#   Both services:        docker compose up
#   API only:             docker compose up fabulator-api
#   One-shot Claude Code: docker compose run --rm claude-code
# =============================================================================
services:

  fabulator-api:
    build:
      context: .                        # root — so COPY requirements.txt works
      dockerfile: server/Dockerfile
    container_name: fabulator-api
    platform: linux/arm64
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app:cached            # live reload without rebuild
    env_file:
      - .env
    restart: unless-stopped

  claude-code:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    image: fabulator-claude-code
    container_name: fabulator-claude
    platform: linux/arm64
    volumes:
      - .:/workspace:cached
      - ${HOME}/.gitconfig:/home/claude/.gitconfig:ro
      - ${HOME}/.ssh:/home/claude/.ssh:ro
    environment:
      # OAuth token auth — DO NOT also set ANTHROPIC_API_KEY here
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - FABULATOR_API_URL=http://fabulator-api:8000
    depends_on:
      fabulator-api:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: "no"

networks:
  default:
    name: fabulator-network

services:
  fabulator-api:
    env_file:
      - .env
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fabulator-api
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    networks:
      - fabulator
    restart: unless-stopped

  dev-claude:
    build:
      context: .
      dockerfile: .devcontainer/claude/Dockerfile
    container_name: fabulator-dev-claude
    command: sleep infinity
    volumes:
      - .:/code
      - ${HOME}/.claude:/root/.claude
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
    networks:
      - fabulator
    ports:
      - "3000:3000"
      - "8080:8080"

networks:
  fabulator:
    driver: bridge